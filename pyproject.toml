[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# Odoo manifest files are standalone dicts by convention; B018 (useless
# expression) doesn't apply.
"**/__manifest__.py" = ["B018"]
